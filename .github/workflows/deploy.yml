
name: Deploy to GitHub Packages

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          # Add your test commands here
          echo "No tests to run"

      - name: Log in to GitHub Packages
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo_name
        run: echo "repo_name=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Determine Docker tags
        id: tags
        run: |
          REPO="ghcr.io/${{ env.repo_name }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            BOT_VERSION=$(grep 'BOT_VERSION = ' main.py | sed 's/.*"\(.*\)".*/\1/')
            VERSION_SHORT=$(echo "$BOT_VERSION" | sed -E 's/^((V[0-9]+)(\.[0-9]+)?).*/\1/')
            echo "tags=${REPO}:latest,${REPO}:${VERSION_SHORT},${REPO}:${BOT_VERSION}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "tags=${REPO}:dev" >> $GITHUB_OUTPUT
          else
            echo "tags=${REPO}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Image digest
        run: echo ${{ steps.build-and-push.outputs.digest }}
